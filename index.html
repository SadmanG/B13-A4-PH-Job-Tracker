<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Job Tracker</title>
    <!-- Include Tailwind CSS and DaisyUI from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" type="text/css" />
    <!-- Include Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-2xl font-semibold text-gray-800">Job Application Tracker</h1>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Total Card -->
            <div class="card bg-white shadow-md p-6 rounded-lg">
                <p class="text-sm font-medium text-gray-500">Total</p>
                <p class="text-3xl font-bold text-gray-800">8</p>
            </div>
            <!-- Interview Card -->
            <div class="card bg-white shadow-md p-6 rounded-lg">
                <p class="text-sm font-medium text-gray-500">Interview</p>
                <p class="text-3xl font-bold text-green-500">0</p>
            </div>
            <!-- Rejected Card -->
            <div class="card bg-white shadow-md p-6 rounded-lg">
                <p class="text-sm font-medium text-gray-500">Rejected</p>
                <p class="text-3xl font-bold text-red-500">0</p>
            </div>
        </div>

        <!-- Available Jobs Section -->
        <div class="bg-white shadow-md rounded-lg p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Available Jobs</h2>
                <span class="text-sm text-gray-500">8 jobs</span>
            </div>

            <!-- Filter Buttons -->
            <div class="flex space-x-4 mb-6">
                <button class="btn btn-primary btn-sm">All</button>
                <button class="btn btn-outline btn-sm">Interview</button>
                <button class="btn btn-outline btn-sm">Rejected</button>
            </div>

            <!-- Job Card -->
            <div class="border border-gray-200 p-6 rounded-lg shadow-sm">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-lg font-bold text-gray-800">Mobile First Corp</h3>
                        <p class="text-gray-600">React Native Developer</p>
                        <p class="text-sm text-gray-500 mt-1">Remote · Full-time · $130,000-$175,000</p>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600">
                        <i class="fa-regular fa-bookmark"></i>
                    </button>
                </div>
                
                <div class="mt-4">
                    <span class="badge badge-info text-xs">NOT APPLIED</span>
                </div>

                <p class="text-gray-600 mt-4">
                    Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.
                </p>

                <div class="flex space-x-4 mt-6">
                    <button class="btn btn-success btn-outline btn-sm">INTERVIEW</button>
                    <button class="btn btn-error btn-outline btn-sm">REJECTED</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
